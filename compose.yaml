services:
    server:
        build:
            context: .
        ports:
            - 8080:8080
        environment:
            SPRING_PROFILES_ACTIVE: dev
            JWT_SECRET: 7e8d5c9b2f0a1e4c8b7d6f5e3c2a1b0f9d8c7e6f5a4b3c2d1e0f9a8b7c6d5e4
            DB_URL: jdbc:postgresql://postgres:5432/taskdb
            DB_USER: postgres
            DB_PASSWORD: password
        depends_on:
            - postgres

    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: taskdb
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
        ports:
            - "5432:5432"
        volumes:
            - task_manager_db:/var/lib/postgresql/data

volumes:
    task_manager_db:
